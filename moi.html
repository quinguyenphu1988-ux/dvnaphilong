<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    
    <title>DVNA Phi Long - Hệ Thống Chọn Món (Cloud)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    
    <style>
        body { background-color: #f8fafc !important; color: #0f172a !important; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .app-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        .glass-header {
            background: rgba(255,255,255,0.75)!important;
            backdrop-filter: blur(14px);
        }

        input, select, button {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        /* --- MENU ANDROID BOTTOM NAV --- */
        #mobile-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.98);
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom)) 0;
            z-index: 99999;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
        }
        #mobile-bottom-nav button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            background: transparent;
            border: none;
            flex: 1;
            transition: all 0.2s ease;
        }
        #mobile-bottom-nav button.active-nav {
            color: #d97706;
        }
        #mobile-bottom-nav button i {
            font-size: 22px;
            transition: transform 0.2s ease;
        }
        #mobile-bottom-nav button.active-nav i {
            transform: scale(1.15);
        }

        @media (min-width: 768px) {
            #mobile-bottom-nav { display: none !important; }
        }
        @media (max-width: 767px) {
            #desktop-top-nav { display: none !important; }
            body { padding-bottom: 90px !important; }
            footer { display: none !important; }
            header h1 { font-size: 20px !important; }
            .grid { gap: 14px !important; }
        }
		#menus-container {
            padding-bottom: 120px !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-white to-orange-50 font-sans min-h-screen antialiased">

    <header class="glass-header border-b border-white/40 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3.5 w-full text-center sm:text-left">
                <div>
                    <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-amber-600 to-orange-600 bg-clip-text text-transparent">DVNA PHI LONG</h1>
                    <p class="text-xs font-semibold text-slate-500 tracking-wide uppercase">Hệ Thống Chọn Món (Đám Mây Supabase)</p>
                </div>
            </div>
        </div>
    </header>

    <nav id="desktop-top-nav" class="bg-white border-b border-slate-200 sticky top-[81px] z-40 shadow-sm">
        <div class="max-w-7xl mx-auto flex overflow-x-auto px-2">
            <button onclick="switchTab('tab-dishes')" id="btn-tab-dishes" class="tab-btn active px-6 py-4 font-bold text-sm border-b-2 border-amber-600 text-amber-600 flex items-center gap-2.5 transition-all"><i class="fa-solid fa-burger text-base"></i> Chọn Món</button>
            <button onclick="switchTab('tab-menus')" id="btn-tab-menus" class="tab-btn px-6 py-4 font-semibold text-sm border-b-2 border-transparent text-slate-500 hover:text-amber-600 flex items-center gap-2.5 transition-all"><i class="fa-solid fa-calendar-check text-base"></i> Đặt Thực Đơn Tiệc</button>
            <button onclick="switchTab('tab-calc')" id="btn-tab-calc" class="tab-btn px-6 py-4 font-semibold text-sm border-b-2 border-transparent text-slate-500 hover:text-amber-600 flex items-center gap-2.5 transition-all"><i class="fa-solid fa-basket-shopping text-base"></i> Tính Vật Tư Đi Chợ</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 space-y-6">
        <div id="tab-dishes" class="tab-content active">
            <div class="space-y-4">
                <div class="app-card px-5 py-3.5 flex items-center gap-2">
                    <h3 class="text-sm font-black text-slate-900 uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-layer-group text-amber-500"></i> DANH SÁCH MÓN ĂN</h3>
                </div>
                
                <div id="dishes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </div>

        <div id="tab-menus" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                <div class="app-card p-5 space-y-5 lg:sticky lg:top-[160px] max-h-[calc(100vh-200px)] overflow-y-auto shadow-sm">
                    <div class="border-b border-slate-100 pb-3"><h3 class="text-base font-black text-slate-900">LÊN THỰC ĐƠN MỚI</h3></div>
                    <div class="space-y-3.5">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Tên khách hàng *</label>
                            <input type="text" id="menu-customer" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2 text-sm font-medium">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Số điện thoại *</label>
                            <input type="text" id="menu-phone" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2 text-sm font-medium">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] font-bold text-slate-500 mb-1">Loại tiệc</label>
                                <select id="menu-type" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-2 py-1.5 text-xs font-semibold text-slate-600">
                                    <option value="Tiệc Đính hôn">Đính hôn</option>
                                    <option value="Vu qui">Vu qui</option>
                                    <option value="Tân hôn">Tân hôn</option>
                                    <option value="Tân gia">Tân gia</option>
                                    <option value="Thôi nôi">Thôi nôi</option>
                                    <option value="Đầy tháng">Đầy tháng</option>
                                    <option value="Hội thảo">Hội thảo</option>
                                    <option value="Tất niên">Tất niên</option>
                                    <option value="Tổng kết">Tổng kết</option>
                                    <option value="Khác">Khác...</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-500 mb-1">Ngày Dương Lịch *</label>
                                <input type="date" id="menu-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-2 py-1.5 text-xs font-semibold text-slate-600">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] font-bold text-slate-500 mb-1">Ngày Âm Lịch (Preview)</label>
                                <input type="text" id="menu-lunar-date" placeholder="Tự động tính..." disabled class="w-full bg-slate-100 border border-slate-200 rounded-xl px-2 py-1.5 text-xs font-semibold text-slate-500 transition-colors duration-300">
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-500 mb-1">Ghi chú phòng tiệc</label>
                                <input type="text" id="menu-note" placeholder="Ví dụ: Ít cay..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-2 py-1.5 text-xs font-semibold text-slate-600">
                            </div>
                        </div>

                    </div>
                    <div class="border-t border-slate-100 pt-4 space-y-2">
                        <label class="block text-[11px] font-black text-slate-700 uppercase">Bấm chọn món vào thực đơn:</label>
                        <div id="menu-dish-selector" class="flex flex-col max-h-64 overflow-y-auto rounded-xl gap-2 p-2 bg-slate-50 border border-slate-200"></div>
                        <div class="space-y-1.5 pt-2" id="menu-selected-dishes-badge"></div>
                    </div>
                    <div class="flex gap-2 pt-2 border-t border-slate-100">
                        <button onclick="resetMenuForm()" class="bg-slate-100 text-slate-600 font-bold text-xs px-4 py-3 rounded-xl cursor-pointer hover:bg-slate-200">Xóa Trắng</button>
                        <button onclick="saveMenu()" class="flex-1 bg-amber-600 text-white font-bold text-sm py-3 rounded-xl shadow-sm cursor-pointer hover:bg-amber-700"><i class="fa-solid fa-bookmark"></i> Lưu Lịch Đặt Tiệc</button>
                    </div>
                </div>
                <div class="lg:col-span-2 space-y-4">
                    <div class="app-card px-4 py-3"><h3 class="text-sm font-black text-slate-900 uppercase">Sổ theo dõi tiệc cưới đám mây</h3></div>
                    <div id="menus-container" class="space-y-3.5"></div>
                </div>
            </div>
        </div>

        <div id="tab-calc" class="tab-content space-y-6">
            <div class="app-card p-5 space-y-4">
                <div class="border-b border-slate-100 pb-2"><h3 class="text-base font-black text-slate-900">GỘP ĐƠN ĐẶT TIỆC TIẾN HÀNH ĐI CHỢ</h3></div>
                <div class="border border-slate-200 rounded-xl overflow-hidden bg-white overflow-x-auto">
                    <table class="w-full text-left text-xs border-collapse min-w-[320px]">
                        <thead>
                            <tr class
