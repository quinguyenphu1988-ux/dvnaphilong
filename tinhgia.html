<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVNA Phi Long</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .custom-modal { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .custom-modal.show { display: flex; }
    </style>
</head>
<body class="bg-amber-50 p-4">

    <div id="dishes-container" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

    <button onclick="openCartModal()" class="fixed bottom-4 right-4 bg-amber-600 text-white w-16 h-16 rounded-full shadow-lg">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-badge" class="absolute top-0 right-0 bg-red-500 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center">0</span>
    </button>

    <div id="cart-modal" class="custom-modal" onclick="closeModal('cart-modal')">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-xl" onclick="event.stopPropagation()">
            <h2 class="font-bold text-lg mb-4">Thực Đơn Của Anh</h2>
            <div id="cart-list-container" class="mb-4"></div>
            
            <button onclick="calculateTablePriceAutomatic()" class="w-full bg-amber-600 text-white font-bold py-3 rounded-xl mb-2">
                TÍNH GIÁ BÀN
            </button>
            <button onclick="clearCart()" class="w-full bg-gray-200 py-2 rounded-xl text-sm">Xóa Giỏ Hàng</button>
            
            <div id="final-price-box" class="mt-4"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kslsewlljxkwcgceqxcf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_I1NCl_wrxzsDRM8wFXgeVQ_8W_JKlKE";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dishesList = [];
        let cartDishes = []; 

        window.addEventListener("DOMContentLoaded", async () => {
            let { data: dishes } = await _supabase.from('dishes').select('*');
            dishesList = dishes || [];
            renderDishes();
        });

        function renderDishes() {
            const container = document.getElementById("dishes-container");
            container.innerHTML = dishesList.map(dish => `
                <div class="bg-white p-4 rounded-xl shadow border">
                    <h4 class="font-bold text-sm mb-2">${dish.name}</h4>
                    <button onclick="toggleCart(${dish.id})" class="w-full py-2 ${cartDishes.includes(dish.id) ? 'bg-amber-600 text-white' : 'bg-gray-100'} rounded-lg text-xs font-bold">
                        ${cartDishes.includes(dish.id) ? 'Đã thêm' : 'Thêm'}
                    </button>
                </div>
            `).join('');
        }

        function toggleCart(id) {
            if(cartDishes.includes(id)) cartDishes = cartDishes.filter(i => i !== id);
            else cartDishes.push(id);
            document.getElementById('cart-badge').innerText = cartDishes.length;
            renderDishes();
        }

        function clearCart() { cartDishes = []; document.getElementById('cart-badge').innerText = 0; renderDishes(); closeModal('cart-modal'); }
        function openCartModal() { document.getElementById('cart-modal').classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        // --- HÀM TÍNH GIÁ BÀN (MỚI) ---
        async function calculateTablePriceAutomatic() {
            if (cartDishes.length === 0) { alert("Anh chưa chọn món!"); return; }

            const priceBox = document.getElementById('final-price-box');
            priceBox.innerHTML = `<p class="text-xs text-amber-600">Đang tính...</p>`;

            try {
                const { data: danhMucGia } = await _supabase.from('danh_muc_gia').select('*');
                
                let totalFoodCost = 0;
                cartDishes.forEach(id => {
                    const dish = dishesList.find(d => d.id === id);
                    const priceInfo = danhMucGia.find(s => s.key.toLowerCase().trim() === dish.name.toLowerCase().trim());
                    if (priceInfo) totalFoodCost += parseFloat(priceInfo.value);
                });

                // Các khoản chi phí cố định (Đảm bảo tên giống hệt Database)
                const fixedCosts = [
                    "Rạp/Bàn Ghế/Chén Bát", 
                    "Chi phí đãi tiệc", 
                    "Chi phí vận chuyển", 
                    "Nước ngọt", 
                    "Suối", 
                    "Khăn/ống hút/tăm", 
                    "Gas"
                ];

                let totalFixedCosts = 0;
                fixedCosts.forEach(name => {
                    const item = danhMucGia.find(s => s.key.toLowerCase().trim() === name.toLowerCase().trim());
                    if (item) totalFixedCosts += parseFloat(item.value);
                });
                
                // Công thức: (Tổng món + Chi phí) + 20% Lãi
                const finalCost = (totalFoodCost + totalFixedCosts) * 1.2;
                const finalPrice = Math.round(finalCost / 1000) * 1000;

                priceBox.innerHTML = `
                    <div class="mt-4 p-3 bg-amber-50 rounded-lg border border-amber-200 text-center">
                        <p class="text-xs font-bold text-amber-800">GIÁ BÁO KHÁCH (TRỌN GÓI)</p>
                        <h3 class="text-xl font-black text-amber-700">${finalPrice.toLocaleString('vi-VN')} đ/bàn</h3>
                    </div>
                `;
            } catch (err) {
                alert("Lỗi tính giá: " + err.message);
                priceBox.innerHTML = "";
            }
        }
    </script>
</body>
</html>
