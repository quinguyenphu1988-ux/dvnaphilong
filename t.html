<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    
    <title>DVNA Phi Long - Hệ Thống Quản Lý Tiệc (Cloud)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #f8fafc !important; color: #0f172a !important; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .app-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        .glass-header {
            background: rgba(255,255,255,0.75)!important;
            backdrop-filter: blur(14px);
        }

        .floating-btn {
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(245,158,11,0.25);
        }

        input, select, button {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        /* --- MENU ANDROID BOTTOM NAV --- */
        #mobile-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.98);
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom)) 0;
            z-index: 99999;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
        }
        #mobile-bottom-nav button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            background: transparent;
            border: none;
            flex: 1;
            transition: all 0.2s ease;
        }
        #mobile-bottom-nav button.active-nav {
            color: #d97706;
        }
        #mobile-bottom-nav button i {
            font-size: 22px;
            transition: transform 0.2s ease;
        }
        #mobile-bottom-nav button.active-nav i {
            transform: scale(1.15);
        }

        @media (min-width: 768px) {
            #mobile-bottom-nav { display: none !important; }
        }
        @media (max-width: 767px) {
            #desktop-top-nav { display: none !important; }
            body { padding-bottom: 90px !important; }
            footer { display: none !important; }
            header h1 { font-size: 20px !important; }
            .grid { gap: 14px !important; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-white to-orange-50 font-sans min-h-screen antialiased">

    <header class="glass-header border-b border-white/40 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3.5">
                <div>
                    <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-amber-600 to-orange-600 bg-clip-text text-transparent">DVNA PHI LONG</h1>
                    <p class="text-xs font-semibold text-slate-500 tracking-wide uppercase">Hệ Thống Quản Lý Thực Đơn (Đám Mây Supabase)</p>
                </div>
            </div>
            <div id="near-party-alert" class="hidden bg-rose-50 border border-rose-200 p-3 rounded-2xl max-w-md shadow-sm">
                <div class="flex items-start gap-3">
                    <span class="flex h-3 w-3 relative mt-1.5 shrink-0">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500"></span>
                    </span>
                    <div>
                        <h4 class="text-xs font-black text-rose-800 uppercase tracking-wider">Tiệc sắp diễn ra (Trong 5 ngày)</h4>
                        <p id="alert-content" class="text-xs text-rose-600 font-medium mt-0.5 leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <nav id="desktop-top-nav" class="bg-white border-b border-slate-200 sticky top-[81px] z-40 shadow-sm">
        <div class="max-w-7xl mx-auto flex overflow-x-auto px-2">
            <button onclick="switchTab('tab-dishes')" id="btn-tab-dishes" class="tab-btn active px-6 py-4 font-bold text-sm border-b-2 border-amber-600 text-amber-600 flex items-center gap-2.5 transition-all"><i class="fa-solid fa-burger text-base"></i> Danh Mục Món Ăn</button>
            <button onclick="switchTab('tab-menus')" id="btn-tab-menus" class="tab-btn px-6 py-4 font-semibold text-sm border-b-2 border-transparent text-slate-500 hover:text-amber-600 flex items-center gap-2.5 transition-all"><i class="fa-solid fa-calendar-check text-base"></i> Đặt Thực Đơn Tiệc</button>
            <button onclick="switchTab('tab-calc')" id="btn-tab-calc" class="tab-btn px-6 py-4 font-semibold text-sm border-b-2 border-transparent text-slate-500 hover:text-amber-600 flex items-center gap-2.5 transition-all"><i class="fa-solid fa-basket-shopping text-base"></i> Tính Vật Tư Đi Chợ</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 space-y-6">
        <div id="tab-dishes" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                <div class="app-card p-5 space-y-5 lg:sticky lg:top-[160px] max-h-[calc(100vh-200px)] overflow-y-auto shadow-sm">
                    <div class="border-b border-slate-100 pb-3">
                        <h3 class="text-base font-black text-slate-900 flex items-center gap-2"><i class="fa-solid fa-circle-plus text-amber-500"></i> THÊM MÓN ĂN MỚI</h3>
                    </div>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Tên Món Ăn *</label>
                            <input type="text" id="dish-name" placeholder="Ví dụ: Lẩu Cua Đồng, Vịt Quay..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm font-medium">
                        </div>
                        <div class="bg-slate-50 rounded-xl p-3.5 border border-slate-200/60 space-y-3">
                            <input type="text" id="ing-name" placeholder="Tên nguyên liệu..." class="w-full bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" step="any" id="ing-weight" placeholder="Số lượng" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs">
                                <select id="ing-unit" class="w-full bg-white border border-slate-200 rounded-lg text-xs">
                                    <option value="gam">gam</option>
                                    <option value="kg">kg</option>
                                    <option value="cái">cái</option>
                                    <option value="chai">chai</option>
                                    <option value="bọc">bọc</option>
                                    <option value="miếng">miếng</option>
                                    <option value="ổ">ổ</option>
                                    <option value="quả">quả</option>
                                    <option value="trái">trái</option>
                                    <option value="con">con</option>
                                    <option value="hộp">hộp</option>
                                    <option value="lon">lon</option>
                                    <option value="lít">lít</option>
                                    <option value="ml">ml</option>
                                    <option value="bó">bó</option>
                                    <option value="tép">tép</option>
                                    <option value="củ">củ</option>
                                    <option value="nhánh">nhánh</option>
                                    <option value="khác">khác...</option>
                                </select>
                            </div>
                            <select id="ing-type" class="w-full bg-white border border-slate-200 rounded-lg text-xs">
                                <option value="bò">Bò</option>
                                <option value="gà">Gà</option>
                                <option value="heo">Heo</option>
                                <option value="cá">Cá</option>
                                <option value="tôm">Tôm</option>
                                <option value="cua">Cua</option>
                                <option value="ghẹ">Ghẹ</option>
                                <option value="rau củ quả">Rau Củ Quả</option>
                                <option value="nguyên liệu">Nguyên Liệu</option>
                                <option value="gia vị">Gia vị</option>
                                <option value="nước chấm">Nước chấm</option>
                                <option value="khác">Khác...</option>
                            </select>
                            <button onclick="addIngredientToTempList()" class="w-full bg-white text-amber-700 border border-amber-200 font-bold text-xs py-2 rounded-lg cursor-pointer hover:bg-amber-50"><i class="fa-solid fa-plus-circle"></i> Đưa Vào Danh Sách</button>
                            <div id="temp-ing-list" class="flex flex-wrap gap-1.5 pt-2 max-h-24 overflow-y-auto"></div>
                        </div>
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button onclick="resetDishForm()" class="bg-slate-100 text-slate-600 font-bold text-xs px-3 py-3 rounded-xl cursor-pointer hover:bg-slate-200"><i class="fa-solid fa-rotate-left"></i></button>
                        <button onclick="addDish()" class="flex-1 bg-amber-600 text-white font-bold text-sm py-3 rounded-xl shadow-sm cursor-pointer hover:bg-amber-700"><i class="fa-solid fa-circle-check"></i> Lưu Cấu Trúc Món</button>
                    </div>
                    <div class="bg-emerald-50/50 border border-emerald-100 rounded-xl p-3.5 space-y-2.5">
                        <span class="block text-[11px] font-black text-emerald-800 uppercase"><i class="fa-solid fa-file-excel"></i> Đồng bộ từ Excel</span>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="downloadExcelTemplate()" class="bg-white text-slate-700 border border-slate-200 font-bold text-xs py-2 rounded-lg text-center cursor-pointer hover:bg-slate-50">Tải File Mẫu</button>
                            <label class="bg-emerald-700 text-white font-bold text-xs py-2 rounded-lg text-center cursor-pointer hover:bg-emerald-800">
                                Nạp File Trực
                                <input type="file" id="excel-file" accept=".xlsx, .xls" class="hidden" onchange="importExcel(this)">
                            </label>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-4">
                    <div class="app-card px-4 py-3 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                        <h3 class="text-sm font-black text-slate-900 uppercase tracking-wider flex items-center gap-2 shrink-0"><i class="fa-solid fa-layer-group text-amber-500"></i> DANH MỤC MÓN ĂN</h3>
                        <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                            <input type="text" id="dish-search" placeholder="Tìm tên món..." class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5 text-xs w-full sm:w-48 focus:outline-none" oninput="filterDishes()">
                            <select id="dish-filter-group" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5 text-xs w-full sm:w-36 focus:outline-none" onchange="filterDishes()">
                                <option value="">Tất cả nhóm</option>
                                <option value="gỏi">Gỏi / Nộm</option>
                                <option value="đồ nguội">Đồ nguội / Chả</option>
                                <option value="soup">Soup / Súp</option>
                                <option value="bò">Bò</option>
                                <option value="gà">Gà</option>
                                <option value="heo">Heo</option>
                                <option value="tôm">Tôm</option>
                                <option value="mực">Mực</option>
                                <option value="cá">Cá</option>
                                <option value="lẩu">Lẩu</option>
                                <option value="cơm">Cơm / Xôi</option>
                                <option value="tráng miệng">Tráng miệng</option>
                            </select>
                            <span id="dish-count" class="bg-amber-100 text-amber-800 text-xs font-black px-3 py-1.5 rounded-xl text-center">0 món</span>
                        </div>
                    </div>
                    <div id="dishes-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>

        <div id="tab-menus" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                <div class="app-card p-5 space-y-5 lg:sticky lg:top-[160px] max-h-[calc(100vh-200px)] overflow-y-auto shadow-sm">
                    <div class="border-b border-slate-100 pb-3"><h3 class="text-base font-black text-slate-900">LÊN THỰC ĐƠN MỚI</h3></div>
                    <div class="space-y-3.5">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Tên khách hàng *</label>
                            <input type="text" id="menu-customer" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2 text-sm font-medium">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Số điện thoại *</label>
                            <input type="text" id="menu-phone" class="w-full bg-slate-50 border border-
