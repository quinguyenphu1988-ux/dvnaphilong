<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DVNA Phi Long - Thiết Kế Thực Đơn Tiệc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .custom-modal { display: none; position: fixed; inset: 0; z-index: 999999; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; padding: 1rem; }
        .custom-modal.show { display: flex; }
    </style>
</head>
<body class="bg-amber-50 p-4">

    <div class="mb-4 text-center">
        <h1 class="text-xl font-black text-amber-700 uppercase">DVNA PHI LONG</h1>
    </div>

    <div id="dishes-container" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

    <button onclick="openCartModal()" class="fixed bottom-4 right-4 bg-amber-600 text-white w-16 h-16 rounded-full shadow-lg z-50">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-badge" class="absolute top-0 right-0 bg-red-500 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center">0</span>
    </button>

    <div id="cart-modal" class="custom-modal" onclick="closeModal('cart-modal')">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-xl" onclick="event.stopPropagation()">
            <h2 class="font-bold text-lg mb-4">Thực Đơn Của Anh</h2>
            <div id="cart-list-container" class="mb-4 text-sm max-h-[50vh] overflow-y-auto"></div>
            
            <button onclick="calculateTablePriceAutomatic()" class="w-full bg-amber-600 text-white font-black py-3 rounded-xl mb-2 hover:bg-amber-700">TÍNH GIÁ BÀN</button>
            <button onclick="clearCart()" class="w-full bg-gray-200 py-2 rounded-xl text-sm mb-4">Xóa Giỏ Hàng</button>
            
            <div id="final-price-box"></div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://kslsewlljxkwcgceqxcf.supabase.co", "sb_publishable_I1NCl_wrxzsDRM8wFXgeVQ_8W_JKlKE");
        let dishesList = [];
        let cartDishes = []; 

        window.addEventListener("DOMContentLoaded", async () => {
            try {
                let { data: dishes, error } = await _supabase.from('dishes').select('*');
                if (error) throw error;
                dishesList = dishes || [];
                renderDishes();
            } catch (e) {
                console.error(e);
                alert("Lỗi tải dữ liệu: " + e.message);
            }
        });

        function renderDishes() {
            const container = document.getElementById("dishes-container");
            container.innerHTML = dishesList.map(dish => `
                <div class="bg-white p-4 rounded-xl shadow border">
                    <h4 class="font-bold text-sm mb-2">${dish.name}</h4>
                    <button onclick="toggleCart(${dish.id})" class="w-full py-2 ${cartDishes.includes(dish.id) ? 'bg-amber-600 text-white' : 'bg-gray-100'} rounded-lg text-xs font-bold">
                        ${cartDishes.includes(dish.id) ? 'Đã thêm' : 'Thêm'}
                    </button>
                </div>
            `).join('');
        }

        function toggleCart(id) {
            if(cartDishes.includes(id)) cartDishes = cartDishes.filter(i => i !== id);
            else cartDishes.push(id);
            document.getElementById('cart-badge').innerText = cartDishes.length;
            renderDishes();
        }

        function openCartModal() { 
            const list = document.getElementById('cart-list-container');
            list.innerHTML = cartDishes.map(id => {
                const d = dishesList.find(x => x.id == id);
                return d ? `<div class="py-1 border-b">${d.name}</div>` : '';
            }).join('');
            document.getElementById('cart-modal').classList.add('show'); 
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function clearCart() { 
            cartDishes = []; 
            document.getElementById('cart-badge').innerText = 0; 
            document.getElementById('cart-list-container').innerHTML = ''; 
            document.getElementById('final-price-box').innerHTML = ''; 
            renderDishes(); 
            closeModal('cart-modal'); 
        }

        async function calculateTablePriceAutomatic() {
            const priceBox = document.getElementById('final-price-box');
            if (!priceBox) { alert("Lỗi khung hiển thị giá!"); return; }
            
            if (cartDishes.length === 0) { alert("Anh chọn món đi đã!"); return; }
            priceBox.innerHTML = `<p class="text-xs text-center text-amber-600 italic">Đang tính...</p>`;

            try {
                const { data: danhMucGia } = await _supabase.from('danh_muc_gia').select('*');
                let totalFood = 0;
                let missing = [];

                cartDishes.forEach(id => {
                    const dish = dishesList.find(d => d.id == id);
                    if(dish) {
                        const p = danhMucGia.find(s => s.key.toLowerCase().trim() === dish.name.toLowerCase().trim());
                        if(p) totalFood += parseFloat(p.value);
                        else missing.push(dish.name);
                    }
                });

                if(missing.length > 0) { alert("Chưa nhập giá cho: " + missing.join(', ')); priceBox.innerHTML = ""; return; }

                const fixed = ["Rạp/Bàn Ghế/Chén Bát", "Chi phí đãi tiệc", "Chi phí vận chuyển", "Nước ngọt", "Suối", "Khăn/ống hút/tăm", "Gas"];
                let totalFixed = 0;
                fixed.forEach(name => {
                    const item = danhMucGia.find(s => s.key.toLowerCase().trim() === name.toLowerCase().trim());
                    if(item) totalFixed += parseFloat(item.value);
                });
                
                const final = Math.round(((totalFood + totalFixed) * 1.2) / 1000) * 1000;
                priceBox.innerHTML = `<div class="mt-4 p-3 bg-amber-50 rounded-lg text-center font-bold text-amber-900 border border-amber-200">${final.toLocaleString('vi-VN')} đ/bàn</div>`;
            } catch(e) { alert("Lỗi: " + e.message); priceBox.innerHTML = ""; }
        }
    </script>
</body>
</html>
