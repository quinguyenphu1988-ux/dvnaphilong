<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    
    <title>DVNA Phi Long - Thiết Kế Thực Đơn Tiệc</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');
        body { background-color: #f8fafc !important; color: #0f172a !important; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .custom-modal { display: none; position: fixed; inset: 0; z-index: 999999; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px); justify-content: center; align-items: center; padding: 1rem; opacity: 0; transition: opacity 0.3s ease; }
        .custom-modal.show { display: flex; opacity: 1; }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-white to-orange-50 font-sans antialiased text-slate-900">

    <header class="glass-header border-b border-slate-100 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3.5">
                <img src="logo.png" alt="Logo" class="w-14 h-14 object-cover rounded-2xl" onerror="this.style.display='none'">
                <div>
                    <h1 class="text-2xl font-extrabold text-amber-700">DVNA PHI LONG</h1>
                </div>
            </div>
        </div>
    </header>

    <div id="cart-modal" class="custom-modal" onclick="closeModal('cart-modal')">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 relative shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal('cart-modal')" class="absolute top-4 right-4 text-slate-400 text-2xl"><i class="fa-solid fa-circle-xmark"></i></button>
            <h2 class="text-lg font-black text-amber-700 uppercase mb-4 border-b pb-3">Thực Đơn Hiện Tại</h2>
            
            <div id="cart-list-container" class="space-y-1 mb-6 max-h-[50vh] overflow-y-auto"></div>
            
            <div class="pt-4 border-t border-slate-100 space-y-2">
                <button onclick="calculateTablePriceAutomatic()" class="w-full bg-amber-600 text-white font-black py-3 rounded-xl hover:bg-amber-700">TÍNH GIÁ BÀN</button>
                <button onclick="clearCart()" class="w-full bg-rose-50 text-rose-600 font-bold py-2 rounded-xl">Xóa Giỏ Hàng</button>
                
                <div id="final-price-box"></div>
            </div>
        </div>
    </div>

    <script>
        // [GIỮ NGUYÊN TOÀN BỘ SCRIPT CŨ CỦA ANH]
        // Thêm duy nhất hàm này vào cuối file:

        async function calculateTablePriceAutomatic() {
            const priceBox = document.getElementById('final-price-box');
            if (!priceBox) return; // Nếu khung giá chưa được tạo, không chạy hàm
            
            if (cartDishes.length === 0) { alert("Anh chưa chọn món!"); return; }
            priceBox.innerHTML = `<p class="text-center text-amber-600 font-bold p-2 text-xs italic">Đang tính...</p>`;

            try {
                const { data: danhMucGia } = await _supabase.from('danh_muc_gia').select('*');
                let totalFoodCost = 0;
                let missing = [];

                cartDishes.forEach(id => {
                    const dish = dishesList.find(d => d.id == id);
                    const p = danhMucGia.find(s => s.key.toLowerCase().trim() === dish.name.toLowerCase().trim());
                    if(p) totalFoodCost += parseFloat(p.value);
                    else missing.push(dish.name);
                });

                if(missing.length > 0) { alert("Chưa nhập giá cho: " + missing.join(', ')); priceBox.innerHTML = ""; return; }

                const fixed = ["Rạp/Bàn Ghế/Chén Bát", "Chi phí đãi tiệc", "Chi phí vận chuyển", "Nước ngọt", "Suối", "Khăn/ống hút/tăm", "Gas"];
                let totalFixed = 0;
                fixed.forEach(name => {
                    const item = danhMucGia.find(s => s.key.toLowerCase().trim() === name.toLowerCase().trim());
                    if(item) totalFixed += parseFloat(item.value);
                });
                
                const final = Math.round(((totalFoodCost + totalFixed) * 1.2) / 1000) * 1000;
                priceBox.innerHTML = `<div class="mt-4 p-3 bg-amber-50 rounded-lg text-center font-bold text-amber-900 border border-amber-200">${final.toLocaleString('vi-VN')} đ/bàn</div>`;
            } catch(e) { alert("Lỗi: " + e.message); priceBox.innerHTML = ""; }
        }
    </script>
</body>
</html>
