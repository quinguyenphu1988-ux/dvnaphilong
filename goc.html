<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    
    <title>DVNA Phi Long - Thiết Kế Thực Đơn Tiệc</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');
        body { background-color: #f8fafc !important; color: #0f172a !important; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .category-scrollbar::-webkit-scrollbar { height: 4px; }
        .category-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 10px; }
        .category-scrollbar::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
        .glass-header { background: rgba(255,255,255,0.85)!important; backdrop-filter: blur(16px); }
        .premium-dish-card { background: #ffffff; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 18px rgba(0, 0, 0, 0.02); border: 1px solid #f1f5f9; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .custom-modal { display: none; position: fixed; inset: 0; z-index: 999999; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px); justify-content: center; align-items: center; padding: 1rem; opacity: 0; transition: opacity 0.3s ease; }
        .custom-modal.show { display: flex; opacity: 1; }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-white to-orange-50 font-sans antialiased text-slate-900">

    <header class="glass-header border-b border-slate-100 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between"><h1 class="text-xl font-black text-amber-700 uppercase">DVNA PHI LONG</h1></div>
    </header>

    <main class="max-w-7xl mx-auto p-4 space-y-6">
        <div id="dishes-container" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        <button onclick="openCartModal()" class="fixed bottom-4 right-4 bg-amber-600 text-white w-16 h-16 rounded-full shadow-lg z-50">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="cart-badge" class="absolute top-0 right-0 bg-red-500 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center">0</span>
        </button>
    </main>

    <div id="cart-modal" class="custom-modal" onclick="closeModal('cart-modal')">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 relative shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal('cart-modal')" class="absolute top-4 right-4 text-slate-400 text-2xl"><i class="fa-solid fa-circle-xmark"></i></button>
            <h2 class="text-lg font-black text-amber-700 uppercase mb-4 border-b pb-3">Thực Đơn Hiện Tại</h2>
            
            <div id="cart-list-container" class="mb-4 text-sm max-h-[50vh] overflow-y-auto"></div>
            
            <div class="pt-4 border-t border-slate-100 space-y-2">
                <button onclick="calculateTablePriceAutomatic()" class="w-full bg-amber-600 text-white font-black py-3 rounded-xl hover:bg-amber-700">TÍNH GIÁ BÀN</button>
                <button onclick="clearCart()" class="w-full bg-gray-200 py-2 rounded-xl text-sm">Xóa Giỏ Hàng</button>
                
                <div id="final-price-box"></div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://kslsewlljxkwcgceqxcf.supabase.co", "sb_publishable_I1NCl_wrxzsDRM8wFXgeVQ_8W_JKlKE");
        let dishesList = [];
        let cartDishes = [];

        window.addEventListener("DOMContentLoaded", async () => {
            let { data: dishes } = await _supabase.from('dishes').select('*');
            dishesList = dishes || [];
            renderDishes();
        });

        function renderDishes() {
            const container = document.getElementById("dishes-container");
            container.innerHTML = dishesList.map(dish => `
                <div class="bg-white p-4 rounded-xl shadow border">
                    <h4 class="font-bold text-sm mb-2">${dish.name}</h4>
                    <button onclick="toggleCart(${dish.id})" class="w-full py-2 ${cartDishes.includes(dish.id) ? 'bg-amber-600 text-white' : 'bg-gray-100'} rounded-lg text-xs font-bold">
                        ${cartDishes.includes(dish.id) ? 'Đã thêm' : 'Thêm'}
                    </button>
                </div>
            `).join('');
        }

        function toggleCart(id) {
            if(cartDishes.includes(id)) cartDishes = cartDishes.filter(i => i !== id);
            else cartDishes.push(id);
            document.getElementById('cart-badge').innerText = cartDishes.length;
            renderDishes();
        }

        function clearCart() { cartDishes = []; document.getElementById('cart-badge').innerText = 0; document.getElementById('cart-list-container').innerHTML = ''; document.getElementById('final-price-box').innerHTML = ''; renderDishes(); closeModal('cart-modal'); }
        function openCartModal() { 
            const list = document.getElementById('cart-list-container');
            list.innerHTML = cartDishes.map(id => {
                const d = dishesList.find(x => x.id == id);
                return d ? `<div class="py-1 border-b">${d.name}</div>` : '';
            }).join('');
            document.getElementById('cart-modal').classList.add('show'); 
        }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        // --- HÀM TÍNH GIÁ BÀN (BẢN AN TOÀN - ĐÃ FIX LỖI NULL) ---
        async function calculateTablePriceAutomatic() {
            const priceBox = document.getElementById('final-price-box');
            // Dòng này giúp code không bị crash nếu không tìm thấy khung
            if (!priceBox) { console.error("Không tìm thấy khung chứa giá!"); return; }
            
            if (cartDishes.length === 0) { alert("Anh chọn món đi đã!"); return; }
            priceBox.innerHTML = `<p class="text-xs text-center text-amber-600 italic">Đang tính...</p>`;

            try {
                const { data: danhMucGia } = await _supabase.from('danh_muc_gia').select('*');
                let totalFood = 0;
                let missing = [];

                cartDishes.forEach(id => {
                    const dish = dishesList.find(d => d.id == id);
                    if(dish) {
                        const p = danhMucGia.find(s => s.key.toLowerCase().trim() === dish.name.toLowerCase().trim());
                        if(p) totalFood += parseFloat(p.value);
                        else missing.push(dish.name);
                    }
                });

                if(missing.length > 0) { alert("Chưa nhập giá cho: " + missing.join(', ')); priceBox.innerHTML = ""; return; }

                const fixed = ["Rạp/Bàn Ghế/Chén Bát", "Chi phí đãi tiệc", "Chi phí vận chuyển", "Nước ngọt", "Suối", "Khăn/ống hút/tăm", "Gas"];
                let totalFixed = 0;
                fixed.forEach(name => {
                    const item = danhMucGia.find(s => s.key.toLowerCase().trim() === name.toLowerCase().trim());
                    if(item) totalFixed += parseFloat(item.value);
                });
                
                const final = Math.round(((totalFood + totalFixed) * 1.2) / 1000) * 1000;
                priceBox.innerHTML = `<div class="mt-4 p-3 bg-amber-50 rounded-lg text-center font-bold text-amber-900 border border-amber-200">${final.toLocaleString('vi-VN')} đ/bàn</div>`;
            } catch(e) { alert("Lỗi: " + e.message); priceBox.innerHTML = ""; }
        }
    </script>
</body>
</html>
