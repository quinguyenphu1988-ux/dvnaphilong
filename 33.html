    <script>
        const SUPABASE_URL = "https://kslsewlljxkwcgceqxcf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_I1NCl_wrxzsDRM8wFXgeVQ_8W_JKlKE";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dishesList = [];
        let menusList = [];
        let currentEditingMenuId = null;
        let globalCalculatedMarket = null; 

        // Hàm thông minh sinh chuỗi diễn giải ngẫu nhiên theo ID chống trùng lặp nội dung hoàn toàn
        function dynamicExplanationGenerator(dishName, dishId) {
            const name = dishName.trim();
            const lowerName = name.toLowerCase();
            
            const openings = [
                `Thưởng thức tinh hoa ẩm thực từ món ${name}`,
                `Đặc sản ${name} trứ danh được chế biến tỉ mỉ`,
                `Món ngon đẳng cấp ${name} mang đậm dấu ấn sáng tạo`,
                `Sự kết hợp hoàn hảo tạo nên hương vị đặc biệt của ${name}`,
                `Lựa chọn lý tưởng cho thực đơn tiệc sang trọng với ${name}`
            ];

            const endings_goi = [
                ", sở hữu vị chua ngọt đậm đà, giòn mát thanh nhẹ vô cùng kích thích vị giác đầu tiệc.",
                ", hòa quyện nước mắm kẹo chua cay độc quyền, tôn vinh độ tươi giòn của rau củ đi kèm.",
                ", đưa miệng hài hòa, là món khai vị xuất sắc khơi dậy hoàn hảo mọi giác quan của thực khách."
            ];

            const endings_lau = [
                ", sở hữu nước dùng ngọt thanh tinh túy hầm xương, kết hợp rau nấm tươi xanh quây quần bắt vị.",
                ", dậy mùi thơm lừng, nước lẩu đậm đà đúng điệu bếp tiệc Phi Long cho ngày vui thêm trọn vẹn.",
                ", nóng hổi nghi ngút khói, thớ thịt ngọt lịm nhúng lẩu mang tới trải nghiệm vô cùng lôi cuốn."
            ];

            const endings_haisan = [
                ", giữ trọn vị ngọt mặn mòi nguyên bản từ khơi xa, thịt săn chắc thấm đẫm nước sốt đậm đà.",
                ", thớ thịt dai ngọt tự nhiên, kết hợp phương pháp hấp nướng đỉnh cao giữ nguyên độ mọng nước.",
                ", hương thơm nồng nàn quyến rũ thực khách, hòa quyện gia vị cay nhẹ nịnh miệng cực kỳ đưa cơm."
            ];

            const endings_thit = [
                ", thớ thịt mềm mọng thơm lừng bên trong hòa quyện phần da ngoài xử lý quay nướng giòn rụm hảo hạng.",
                ", tẩm ướp thảo mộc gia vị bí truyền đậm đà, thớ thịt chín vàng đều óng ả làm nức lòng thực khách.",
                ", chuẩn vị đầu bếp tiệc chuyên nghiệp, thớ thịt ngọt lịm ăn kèm nước chấm nước sốt sánh mịn bắt vị."
            ];

            const endings_default = [
                ", chuẩn vị đầu bếp tiệc chuyên nghiệp, mang đến trải nghiệm ẩm thực vô cùng thơm ngon và bổ dưỡng.",
                ", đậm đà bản sắc truyền thức kết hợp decor tinh tế, nâng tầm đẳng cấp bữa tiệc quý khách.",
                ", hấp dẫn từ màu sắc đến hương vị, cam kết mang đến sự hài lòng trọn vẹn cho mọi quý thực khách."
            ];

            const openIdx = dishId % openings.length;
            let endIdx = dishId % 3;

            let finalSentence = openings[openIdx];

            if (lowerName.includes('gỏi') || lowerName.includes('nộm') || lowerName.includes('nguội') || lowerName.includes('chả') || lowerName.includes('nem')) {
                finalSentence += endings_goi[endIdx];
            } else if (lowerName.includes('lẩu') || lowerName.includes('cù lao') || lowerName.includes('súp') || lowerName.includes('soup')) {
                finalSentence += endings_lau[endIdx];
            } else if (lowerName.includes('tôm') || lowerName.includes('mực') || lowerName.includes('cá') || lowerName.includes('cua') || lowerName.includes('ghẹ') || lowerName.includes('hải sản')) {
                finalSentence += endings_haisan[endIdx];
            } else if (lowerName.includes('heo') || lowerName.includes('bò') || lowerName.includes('gà') || lowerName.includes('vịt') || lowerName.includes('quay') || lowerName.includes('nướng')) {
                finalSentence += endings_thit[endIdx];
            } else {
                finalSentence += endings_default[endIdx];
            }

            return finalSentence;
        }

        function getLunarDateString(solarDateStr) {
            if (!solarDateStr || typeof Solar === 'undefined') return '---';
            try {
                const parts = solarDateStr.split('-');
                const solar = Solar.fromYmd(parseInt(parts[0], 10), parseInt(parts[1], 10), parseInt(parts[2], 10));
                const lunar = solar.getLunar();
                
                let lDay = lunar.getDay();
                let lMonth = Math.abs(lunar.getMonth());
                let isLeap = lunar.getMonth() < 0; 
                
                let dd = lDay < 10 ? '0' + lDay : lDay;
                let mm = lMonth < 10 ? '0' + lMonth : lMonth;
                let leapStr = isLeap ? " (Nhuận)" : "";
                
                return `${dd}/${mm}${leapStr}`;
            } catch (error) {
                console.error("Lỗi tính lịch âm:", error);
                return '---';
            }
        }

        window.addEventListener("DOMContentLoaded", async () => {
            await loadAllCloudData();
            
            const dateInput = document.getElementById('menu-date');
            if (dateInput) {
                dateInput.addEventListener('change', function(e) {
                    const lunarInput = document.getElementById('menu-lunar-date');
                    lunarInput.value = getLunarDateString(e.target.value) + " Âm";
                    
                    lunarInput.classList.remove('bg-slate-100');
                    lunarInput.classList.add('bg-amber-100', 'text-amber-800');
                    setTimeout(() => {
                        lunarInput.classList.remove('bg-amber-100', 'text-amber-800');
                        lunarInput.classList.add('bg-slate-100');
                    }, 800);
                });
            }
        });

        async function loadAllCloudData() {
            try {
                let { data: dishes, error: e1 } = await _supabase.from('dishes').select('*').order('timestamp', { ascending: false });
                if (!e1) dishesList = dishes || [];
                
                let { data: menus, error: e2 } = await _supabase.from('menus').select('*');
                if (!e2) menusList = menus || [];

                renderDishes(dishesList);
                renderMenuDishSelector();
                renderMenus();
                renderCalcPartiesTable();
            } catch (err) {
                console.error("Lỗi đồng bộ Supabase Cloud:", err);
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('active', 'text-amber-600', 'border-amber-600');
                el.classList.add('text-slate-500', 'border-transparent');
            });
            document.getElementById(tabId).classList.add('active');
            const activeBtn = document.getElementById(`btn-${tabId}`);
            if(activeBtn) activeBtn.classList.add('active', 'text-amber-600', 'border-amber-600');

            const mobileBtns = document.querySelectorAll('#mobile-bottom-nav button');
            mobileBtns.forEach(b => b.classList.remove('active-nav'));
            if(tabId === 'tab-dishes') mobileBtns[0].classList.add('active-nav');
            if(tabId === 'tab-menus') mobileBtns[1].classList.add('active-nav');
            if(tabId === 'tab-calc') mobileBtns[2].classList.add('active-nav');

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderDishes(listToRender = dishesList) {
            const container = document.getElementById("dishes-container");
            container.innerHTML = "";
            
            if(!listToRender || listToRender.length === 0) {
                container.innerHTML = `<div class="col-span-full p-10 text-center text-sm text-slate-400 bg-white rounded-3xl border border-slate-100 shadow-inner">Hiện tại danh sách món ăn đang trống hoặc đang tải từ đám mây...</div>`;
                return;
            }

            // 1. Gom nhóm danh sách món ăn dựa trên cột category từ database
            const groups = {};
            listToRender.forEach(dish => {
                if (!dish || !dish.name) return;
                const cat = dish.category ? dish.category.trim() : "Món Khác";
