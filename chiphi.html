<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    
    <title>DVNA Phi Long - Thiết Kế Thực Đơn Tiệc</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');
        
        body { background-color: #f8fafc !important; color: #0f172a !important; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .category-scrollbar::-webkit-scrollbar { height: 4px; }
        .category-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 10px; }
        .category-scrollbar::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }

        .glass-header {
            background: rgba(255,255,255,0.85)!important;
            backdrop-filter: blur(16px);
        }

        input, select, button { -webkit-tap-highlight-color: transparent; outline: none; }

        .premium-dish-card {
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- CÁC MODAL --- */
        .custom-modal { 
            display: none; position: fixed; inset: 0; z-index: 999999; 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px); 
            justify-content: center; align-items: center; padding: 1rem; 
            opacity: 0; transition: opacity 0.3s ease; 
        }
        .custom-modal.show { display: flex; opacity: 1; }
        
        #image-modal img { 
            max-width: 100%; max-height: 75vh; border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: scale(0.9); 
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        #image-modal.show img { transform: scale(1); }

        /* --- THIẾT KẾ BILLBOARD MENU TẢI VỀ --- */
        #menu-print-area {
            background: url('https://www.transparenttextures.com/patterns/cream-paper.png'), linear-gradient(135deg, #fffbeb 0%, #ffffff 100%);
            border: 8px solid #d97706;
            outline: 2px solid #b45309;
            outline-offset: -12px;
        }

        .font-elegant { font-family: 'Playfair Display', serif; }

        /* --- MENU ANDROID BOTTOM NAV --- */
        #mobile-bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background-color: rgba(255, 255, 255, 0.98); border-top: 1px solid #e2e8f0;
            display: flex; justify-content: space-around; align-items: center;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom)) 0; z-index: 99998;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
        }
        #mobile-bottom-nav button {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 6px; font-size: 11px; font-weight: 700; color: #94a3b8;
            background: transparent; border: none; flex: 1; transition: all 0.2s ease;
        }
        #mobile-bottom-nav button.active-nav { color: #d97706; }
        #mobile-bottom-nav button i { font-size: 20px; transition: transform 0.2s ease; }
        #mobile-bottom-nav button.active-nav i { transform: scale(1.15); }

        @media (min-width: 768px) { #mobile-bottom-nav { display: none !important; } }
        @media (max-width: 767px) {
            #desktop-top-nav { display: none !important; }
            body { padding-bottom: 95px !important; }
            footer { display: none !important; }
            header h1 { font-size: 22px !important; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-white to-orange-50 font-sans min-h-screen antialiased text-slate-900">

    <header class="glass-header border-b border-slate-100 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3.5">
                <img src="logo.png" alt="Logo Phi Long" class="w-14 h-14 object-cover rounded-2xl border border-amber-100 shadow-sm" onerror="this.style.display='none'">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight bg-gradient-to-r from-amber-600 via-orange-600 to-amber-700 bg-clip-text text-transparent drop-shadow-sm">DVNA PHI LONG</h1>
                    <p class="text-[11px] font-bold text-amber-600 tracking-wide mt-0.5">Tiệc ngon, trọn niềm vui — ĐT: 0909.05.06.17</p>
                </div>
            </div>
        </div>
    </header>

    <nav id="desktop-top-nav" class="bg-white border-b border-slate-200 sticky top-[81px] z-40 shadow-sm">
        <div class="max-w-7xl mx-auto flex overflow-x-auto px-2">
            <button onclick="switchTab('tab-dishes')" id="btn-tab-dishes" class="tab-btn active px-6 py-4 font-bold text-sm border-b-2 border-amber-600 text-amber-600 flex items-center gap-2.5 transition-all"><i class="fa-solid fa-burger text-base"></i> Chọn Món</button>
            <button onclick="switchTab('tab-sample-menus')" id="btn-tab-sample-menus" class="tab-btn px-6 py-4 font-semibold text-sm border-b-2 border-transparent text-slate-500 hover:text-amber-600 flex items-center gap-2.5 transition-all"><i class="fa-solid fa-star text-base"></i> Thực Đơn Mẫu</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 space-y-6 relative">
        
        <button id="floating-cart-btn" onclick="openCartModal()" class="fixed bottom-24 right-4 md:bottom-8 md:right-8 bg-amber-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center z-50 hover:bg-amber-700 transition-transform hover:scale-105 border border-amber-400">
            <i class="fa-solid fa-clipboard-list text-2xl"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-600 text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-white shadow-sm">0</span>
        </button>

        <div id="tab-dishes" class="tab-content active">
            <div id="dish-category-filters" class="flex overflow-x-auto gap-2.5 pb-3 mb-4 snap-x category-scrollbar"></div>
            <div id="dishes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
        </div>

        <div id="tab-sample-menus" class="tab-content space-y-6">
            <div class="bg-white/95 backdrop-blur-md p-5 space-y-4 rounded-3xl border border-slate-100 shadow-sm">
                <div class="border-b border-slate-100 pb-2">
                    <h3 class="text-base font-black text-slate-900 uppercase">Thực Đơn Mẫu</h3>
                    <p class="text-xs text-slate-500 mt-1 italic">Các bộ thực đơn ưu tiên tiêu chuẩn miền Tây với những tên gọi chúc phúc sang trọng.</p>
                </div>
                <div id="sample-menus-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 text-center py-4 text-[11px] fixed bottom-0 left-0 right-0 z-30 shadow-md">
        <p>© 2026 <b>Dịch Vụ Nấu Ăn Phi Long</b> - Đám mây Supabase.</p>
    </footer>

    <div id="cart-modal" class="custom-modal" onclick="closeModal('cart-modal')">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 relative shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal('cart-modal')" class="absolute top-4 right-4 text-slate-400 text-2xl hover:text-rose-500"><i class="fa-solid fa-circle-xmark"></i></button>
            <h2 class="text-lg font-black text-amber-700 uppercase mb-4 pr-6 border-b border-slate-100 pb-3"><i class="fa-solid fa-clipboard-list"></i> Thực Đơn Hiện Tại</h2>
            
            <div id="cart-list-container" class="space-y-1 mb-6 max-h-[50vh] overflow-y-auto pr-2"></div>
            
            <div class="pt-4 border-t border-slate-100 space-y-2">
                <button onclick="calculateTablePriceAutomatic()" class="w-full bg-amber-600 text-white font-black py-3 rounded-xl text-xs hover:bg-amber-700 shadow-md flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> TÍNH GIÁ BÀN
                </button>
                <button onclick="clearCart()" class="w-full bg-rose-50 text-rose-600 font-bold py-2.5 rounded-xl text-xs hover:bg-rose-100">Xóa Giỏ Hàng</button>
                <div id="final-price-box"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kslsewlljxkwcgceqxcf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_I1NCl_wrxzsDRM8wFXgeVQ_8W_JKlKE";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dishesList = [];
        let cartDishes = []; 

        window.addEventListener("DOMContentLoaded", async () => {
            let { data: dishes } = await _supabase.from('dishes').select('*');
            dishesList = dishes || [];
            renderDishes();
        });

        function renderDishes() {
            const container = document.getElementById("dishes-container");
            container.innerHTML = dishesList.map(dish => `
                <div class="premium-dish-card p-4">
                    <h4 class="font-black text-amber-700 mb-2">${dish.name}</h4>
                    <button onclick="toggleCart(${dish.id})" class="w-full py-2 ${cartDishes.includes(dish.id) ? 'bg-amber-600 text-white' : 'bg-slate-100'} rounded-lg font-bold text-xs">
                        ${cartDishes.includes(dish.id) ? 'Đã thêm' : 'Thêm'}
                    </button>
                </div>
            `).join('');
        }

        function toggleCart(id) {
            if(cartDishes.includes(id)) cartDishes = cartDishes.filter(i => i !== id);
            else cartDishes.push(id);
            document.getElementById('cart-badge').innerText = cartDishes.length;
            renderDishes();
        }

        function clearCart() { cartDishes = []; document.getElementById('cart-badge').innerText = 0; document.getElementById('final-price-box').innerHTML = ''; renderDishes(); closeModal('cart-modal'); }
        function openCartModal() { document.getElementById('cart-modal').classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        // --- HÀM TÍNH GIÁ BÀN (KHỚP VỚI CSDL) ---
        async function calculateTablePriceAutomatic() {
            if (cartDishes.length === 0) { alert("Anh Quí chọn món trước đã nha!"); return; }

            const priceBox = document.getElementById('final-price-box');
            priceBox.innerHTML = `<p class="text-center text-amber-600 font-bold p-2 text-xs italic">Đang tính...</p>`;

            try {
                const { data: danhMucGia } = await _supabase.from('danh_muc_gia').select('*');
                
                let totalFoodCost = 0;
                let missingPrices = [];

                cartDishes.forEach(id => {
                    const dish = dishesList.find(d => d.id == id);
                    // So khớp tên bằng cách đưa về chữ thường và cắt khoảng trắng
                    const priceInfo = danhMucGia.find(s => s.key.toLowerCase().trim() === dish.name.toLowerCase().trim());
                    
                    if (priceInfo && parseFloat(priceInfo.value) > 0) {
                        totalFoodCost += parseFloat(priceInfo.value);
                    } else {
                        missingPrices.push(dish.name);
                    }
                });

                if (missingPrices.length > 0) {
                    alert(`CẢNH BÁO: Các món sau chưa nhập giá:\n- ${missingPrices.join('\n- ')}\nAnh qua trang Giá Nguyên Liệu nhập giá trước nhé!`);
                    priceBox.innerHTML = "";
                    return;
                }

                // Chi phí cố định (Khớp chính xác tên anh đã lưu)
                const fixedCosts = [
                    "Rạp/Bàn Ghế/Chén Bát", 
                    "Chi phí đãi tiệc", 
                    "Chi phí vận chuyển", 
                    "Nước ngọt", 
                    "Suối", 
                    "Khăn/ống hút/tăm", 
                    "Gas"
                ];

                let totalFixedCosts = 0;
                fixedCosts.forEach(name => {
                    const item = danhMucGia.find(s => s.key.toLowerCase().trim() === name.toLowerCase().trim());
                    if (item) totalFixedCosts += parseFloat(item.value);
                });
                
                const finalCost = (totalFoodCost + totalFixedCosts) * 1.2;
                const finalPrice = Math.round(finalCost / 1000) * 1000;

                priceBox.innerHTML = `
                    <div class="mt-4 p-3 bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200 rounded-lg text-center shadow-inner">
                        <p class="text-[10px] font-bold text-amber-800 uppercase">GIÁ BÁO KHÁCH (TRỌN GÓI)</p>
                        <h3 class="text-xl font-black text-amber-700">${finalPrice.toLocaleString('vi-VN')} đ/bàn</h3>
                    </div>
                `;
            } catch (err) {
                alert("Lỗi: " + err.message);
                priceBox.innerHTML = "";
            }
        }
    </script>
</body>
</html>
