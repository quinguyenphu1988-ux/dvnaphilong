<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Giá Món Ăn - DVNA Phi Long</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
        input, select { outline: none; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen p-4 pb-24">

    <header class="mb-4 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-black text-amber-700 uppercase drop-shadow-sm">Bảng Giá Món Ăn</h1>
            <p class="text-[11px] font-bold text-amber-600">Quản lý giá vốn từng món & Chi phí dịch vụ</p>
        </div>
        <button onclick="loadSettings()" class="bg-white p-3 rounded-full shadow text-amber-600 hover:bg-amber-50 transition">
            <i class="fa-solid fa-rotate-right"></i>
        </button>
    </header>

    <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 mb-4 space-y-2">
        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
            <input type="text" id="search-box" oninput="filterItems()" placeholder="Tìm nhanh tên món ăn / dịch vụ..." class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-slate-700 focus:border-amber-500">
        </div>
        <div class="flex items-center justify-between pt-1">
            <label class="flex items-center gap-2 cursor-pointer text-xs font-black text-rose-600 uppercase tracking-wide">
                <input type="checkbox" id="filter-zero-checkbox" onchange="filterItems()" class="w-4 h-4 rounded border-slate-300 text-rose-600 focus:ring-rose-500">
                <i class="fa-solid fa-circle-exclamation"></i> Chỉ hiện món chưa nhập giá (0đ)
            </label>
            <span id="total-count-badge" class="text-[10px] bg-slate-100 text-slate-600 font-black px-2 py-0.5 rounded-full">Đang tải...</span>
        </div>
    </div>

    <button onclick="syncDishesToPriceList()" class="w-full mb-4 bg-amber-500 text-white font-black py-3 rounded-xl shadow-md hover:bg-amber-600 transition flex items-center justify-center gap-2 text-sm uppercase tracking-wide">
        <i class="fa-solid fa-cloud-arrow-down"></i> Quét & Đồng Bộ Danh Sách Món Ăn
    </button>

    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
        <h3 class="text-[12px] font-black text-slate-700 mb-3 uppercase tracking-wide"><i class="fa-solid fa-plus text-emerald-600 mr-1"></i> Thêm Chi Phí / Món Khác</h3>
        
        <div class="grid grid-cols-2 gap-2 mb-2">
            <input type="text" id="new-key" placeholder="Tên (VD: Khăn ướt)" class="p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[13px] font-bold text-slate-700 focus:border-amber-400">
            <input type="number" id="new-value" placeholder="Giá tiền" class="p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[13px] font-bold text-slate-700 text-right focus:border-amber-400">
        </div>
        
        <div class="flex gap-2">
            <select id="new-unit" class="p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[13px] font-bold text-slate-700 flex-1 focus:border-amber-400">
                <option value="món">Món (Bao trọn)</option>
                <option value="bàn">Bàn (Chi phí)</option>
                <option value="chuyến">Chuyến (Xe)</option>
                <option value="gói">Gói / Chai / Thùng</option>
            </select>
            <button onclick="addNewItem()" class="bg-emerald-600 text-white font-black px-6 rounded-lg hover:bg-emerald-700 shadow-sm transition text-[13px]">
                THÊM
            </button>
        </div>
    </div>

    <div id="settings-container">
        <p class="text-center text-slate-400 text-sm py-10"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>Đang tải dữ liệu từ máy chủ...</p>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-3 sm:p-4 bg-white/95 backdrop-blur-md border-t border-slate-200 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] flex justify-center gap-2 z-50">
        <a href="index.html" class="flex-1 bg-slate-800 text-white text-center font-black py-3 sm:py-3.5 rounded-xl uppercase text-[11px] sm:text-xs shadow-md hover:bg-slate-900 transition tracking-wide flex items-center justify-center">
            <i class="fa-solid fa-utensils mr-1.5 text-amber-500"></i> Thực Đơn
        </a>
        <button onclick="saveAllPrices()" id="btn-save-all" class="flex-1 bg-emerald-600 text-white text-center font-black py-3 sm:py-3.5 rounded-xl uppercase text-[11px] sm:text-xs shadow-md hover:bg-emerald-700 transition tracking-wide flex items-center justify-center">
            <i class="fa-solid fa-floppy-disk mr-1.5"></i> Lưu Tất Cả
        </button>
    </div>

    <script>
        const SUPABASE_URL = "https://kslsewlljxkwcgceqxcf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_I1NCl_wrxzsDRM8wFXgeVQ_8W_JKlKE";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let localDataCached = [];

        function categorizeItem(name) {
            const n = name.toLowerCase().trim();
            if (n.includes('rạp/bàn ghế/chén bát') || n.includes('chi phí đãi tiệc') || n.includes('chi phí vận chuyển') || n.includes('nước ngọt') || n.includes('suối') || n.includes('khăn/ống hút/tăm') || n.includes('gas')) {
                return 'Khoản Riêng: Chi Phí Cố Định & Dịch Vụ';
            }
            return 'Danh Sách Món Ăn (Giá Vốn)';
        }

        async function loadSettings() {
            const { data, error } = await _supabase.from('danh_muc_gia').select('*').order('key', { ascending: true });
            if(error) return;
            localDataCached = data || [];
            renderFilteredContent(localDataCached);
        }

        function filterItems() {
            const searchKeyword = document.getElementById('search-box').value.toLowerCase().trim();
            const onlyZero = document.getElementById('filter-zero-checkbox').checked;

            const filtered = localDataCached.filter(item => {
                const matchKeyword = item.key.toLowerCase().includes(searchKeyword);
                const matchZero = onlyZero ? (parseFloat(item.value) === 0) : true;
                return matchKeyword && matchZero;
            });

            renderFilteredContent(filtered);
        }

        function renderFilteredContent(dataArray) {
            const container = document.getElementById('settings-container');
            document.getElementById('total-count-badge').innerText = `Hiển thị: ${dataArray.length} mục`;

            if(dataArray.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-center text-xs py-12 bg-white rounded-xl border border-slate-200 shadow-sm">Không tìm thấy dữ liệu phù hợp...</p>`;
                return;
            }

            const groups = {};
            dataArray.forEach(item => {
                const cat = categorizeItem(item.key);
                if(!groups[cat]) groups[cat] = [];
                groups[cat].push(item);
            });

            const order = ['Khoản Riêng: Chi Phí Cố Định & Dịch Vụ', 'Danh Sách Món Ăn (Giá Vốn)'];
            const sortedKeys = Object.keys(groups).sort((a, b) => {
                let indexA = order.indexOf(a); let indexB = order.indexOf(b);
                if(indexA === -1) indexA = 99; if(indexB === -1) indexB = 99;
                return indexA - indexB;
            });

            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            
            sortedKeys.forEach(catName => {
                const items = groups[catName];
                const isSpecialCost = catName.includes('Khoản Riêng');
                html += `
                <div class="bg-white rounded-xl shadow-sm border ${isSpecialCost ? 'border-amber-300 ring-1 ring-amber-100 shadow-md' : 'border-slate-200'} overflow-hidden flex flex-col h-full">
                    <div class="${isSpecialCost ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white' : 'bg-slate-100 text-slate-800'} p-3 border-b border-slate-200 flex justify-between items-center">
                        <h4 class="font-black text-[12px] uppercase tracking-wide">${catName}</h4>
                    </div>
                    <div class="p-2 space-y-1 flex-1 max-h-[60vh] overflow-y-auto">
                        ${items.map(item => `
                            <div class="flex justify-between items-center py-2 border-b border-slate-50 last:border-0 hover:bg-slate-50 rounded px-2 transition">
                                <div class="flex-1 pr-2">
                                    <p class="text-[13px] font-bold text-slate-700 capitalize line-clamp-2 ${item.value == 0 ? 'text-rose-500 font-black' : ''}">
                                        ${item.value == 0 ? '<i class="fa-solid fa-circle-exclamation text-rose-500 text-[10px]"></i> ' : ''}${item.key}
                                    </p>
                                </div>
                                <div class="flex items-center gap-1">
                                    <input type="number" id="input-${item.id}" value="${item.value}" onchange="markAsChanged('${item.id}')" class="w-20 sm:w-[90px] p-2 bg-slate-50 border ${item.value == 0 ? 'border-rose-300 text-rose-600' : 'border-slate-200 text-emerald-700'} rounded-lg text-right font-black text-[13px] focus:border-amber-400 focus:bg-white transition-colors">
                                    <button onclick="updatePrice('${item.id}')" title="Lưu nhanh món này" class="text-amber-500 hover:text-amber-700 p-2 bg-amber-50 hover:bg-amber-100 rounded-lg transition-colors"><i class="fa-solid fa-floppy-disk"></i></button>
                                    <button onclick="deleteItem('${item.id}', '${item.key.replace(/'/g, "\\'")}')" title="Xóa món này" class="text-slate-300 hover:text-rose-500 p-2 hover:bg-rose-50 rounded-lg transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                `;
            });
            
            html += `</div>`;
            container.innerHTML = html;
        }

        function markAsChanged(id) {
            const inputEl = document.getElementById(`input-${id}`);
            inputEl.classList.add('bg-amber-50', 'border-amber-400', 'text-amber-700');
        }

        // --- HÀM LƯU TỪNG MÓN ---
        async function updatePrice(id) {
            const inputEl = document.getElementById(`input-${id}`);
            const newValue = inputEl.value;
            const { error } = await _supabase.from('danh_muc_gia').update({ value: newValue }).eq('id', id);
            if(error) {
                alert("Lỗi khi lưu: " + error.message);
            } else {
                inputEl.classList.remove('bg-amber-50', 'border-amber-400', 'text-amber-700');
                inputEl.classList.add('bg-emerald-50', 'border-emerald-400', 'text-emerald-700');
                const found = localDataCached.find(d => d.id == id);
                if(found) found.value = newValue;
                setTimeout(() => { filterItems(); }, 400);
            }
        }

        // --- HÀM LƯU TẤT CẢ CÙNG LÚC ---
        async function saveAllPrices() {
            const btn = document.getElementById('btn-save-all');
            const originalText = `<i class="fa-solid fa-floppy-disk mr-1.5"></i> Lưu Tất Cả`;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1.5"></i> Đang lưu...`;
            
            try {
                const updates = localDataCached.map(item => {
                    const inputEl = document.getElementById(`input-${item.id}`);
                    const newVal = inputEl ? parseFloat(inputEl.value) : item.value;
                    return {
                        id: item.id,
                        key: item.key,
                        value: newVal || 0,
                        unit: item.unit
                    };
                });

                if(updates.length === 0) {
                    alert("Không có dữ liệu để lưu!");
                    btn.innerHTML = originalText;
                    return;
                }

                const { error } = await _supabase.from('danh_muc_gia').upsert(updates);
                
                if (error) throw error;

                btn.classList.replace('bg-emerald-600', 'bg-amber-500');
                btn.classList.replace('hover:bg-emerald-700', 'hover:bg-amber-600');
                btn.innerHTML = `<i class="fa-solid fa-check mr-1.5"></i> Đã Lưu`;
                
                setTimeout(() => {
                    btn.classList.replace('bg-amber-500', 'bg-emerald-600');
                    btn.classList.replace('hover:bg-amber-600', 'hover:bg-emerald-700');
                    btn.innerHTML = originalText;
                    loadSettings(); 
                }, 1500);

            } catch (err) {
                alert("Lỗi khi lưu tổng: " + err.message);
                btn.innerHTML = originalText;
            }
        }

        async function addNewItem() {
            const keyBtn = document.getElementById('new-key');
            const valBtn = document.getElementById('new-value');
            const unitBtn = document.getElementById('new-unit');
            
            const key = keyBtn.value.trim();
            const value = valBtn.value;
            const unit = unitBtn.value;

            if(!key || !value) { alert("Nhập đủ thông tin nhé!"); return; }

            const { error } = await _supabase.from('danh_muc_gia').insert([{ key: key, value: parseFloat(value), unit: unit }]);
            if(!error) { keyBtn.value = ''; valBtn.value = ''; loadSettings(); }
        }

        async function deleteItem(id, name) {
            if(confirm(`Anh có chắc muốn xóa "${name}"?`)) {
                const { error } = await _supabase.from('danh_muc_gia').delete().eq('id', id);
                if(!error) loadSettings();
            }
        }

        async function syncDishesToPriceList() {
            const btn = document.querySelector('button[onclick="syncDishesToPriceList()"]');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Đang đồng bộ...`;
            
            try {
                const { data: dishes, error: dishError } = await _supabase.from('dishes').select('name');
                const { data: currentPrices, error: priceError } = await _supabase.from('danh_muc_gia').select('key');
                
                if (dishError || priceError) throw new Error("Lỗi kết nối CSDL");

                const existingKeys = currentPrices.map(p => p.key.toLowerCase().trim());
                let newItemsMap = new Map();

                const specialCosts = [
                    'Rạp/Bàn Ghế/Chén Bát', 'Chi phí đãi tiệc', 'Chi phí vận chuyển', 
                    'Nước ngọt', 'Suối', 'Khăn/ống hút/tăm', 'Gas'
                ];

                specialCosts.forEach(cost => {
                    if (!existingKeys.includes(cost.toLowerCase())) {
                        newItemsMap.set(cost.toLowerCase(), { key: cost, value: 0, unit: 'bàn' });
                    }
                });

                dishes.forEach(dish => {
                    const dishName = dish.name.trim();
                    const dishLower = dishName.toLowerCase();
                    if (!existingKeys.includes(dishLower) && !newItemsMap.has(dishLower)) {
                        newItemsMap.set(dishLower, { key: dishName, value: 0, unit: 'món' });
                    }
                });

                const newItems = Array.from(newItemsMap.values());

                if (newItems.length > 0) {
                    await _supabase.from('danh_muc_gia').insert(newItems);
                    alert(`Thành công! Đã cập nhật ${newItems.length} món ăn/chi phí mới vào bảng giá.`);
                    loadSettings();
                } else {
                    alert("Tất cả món ăn và chi phí đều đã có trong bảng, anh cứ yên tâm nhập giá nhé!");
                }
            } catch (err) {
                alert(err.message);
            } finally {
                btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-down"></i> Quét & Đồng Bộ Danh Sách Món Ăn`;
            }
        }

        window.addEventListener("DOMContentLoaded", loadSettings);
    </script>
</body>
</html>
